<style>
  #app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  /* TOPBAR */
  .topbar {
    display: flex; align-items: center; gap: 24px;
    padding: 0 24px; height: 60px; flex: none;
    background: linear-gradient(180deg, #0E0E16, var(--bg-panel));
    border-bottom: 1px solid var(--line-gold);
  }
  .topbar .brand { display: flex; align-items: center; gap: 12px; }
  .topbar .crest { width: 30px; height: 30px; position: relative; }
  .topbar .crest > i {
    position: absolute; inset: 0; transform: rotate(45deg); border-radius: 5px;
    border: 1.5px solid var(--gold); background: linear-gradient(135deg, rgba(200,155,60,.2), transparent);
  }
  .topbar .crest > b { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--font-display); font-size: 15px; color: var(--gold-bright); }
  .topbar .ttl { font-family: var(--font-display); font-size: 16px; color: var(--gold-pale); letter-spacing: .06em; }
  .nav { display: flex; gap: 2px; flex: 1; }
  .nav button {
    padding: 8px 15px; border-radius: 7px; font-size: 13px; font-weight: 600; letter-spacing: .02em;
    color: var(--ink-dim); border: 1px solid transparent; transition: all .15s ease;
  }
  .nav button:hover { color: var(--ink); background: var(--bg-hover); }
  .nav button.active { color: var(--gold-bright); background: var(--bg-inset); border-color: var(--line-gold); }
  .topbar .session { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); }
  .page { flex: 1; min-height: 0; overflow: hidden; }

  /* RESPONSIVE — tablette 768px : colonnes empilées, pas de scroll horizontal */
  @media (max-width: 980px) {
    .sheet-grid { grid-template-columns: 1fr !important; }
    .prog-grid { grid-template-columns: 1fr !important; }
    .rune-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 768px) {
    .topbar { gap: 12px; overflow-x: auto; }
    .nav { gap: 0; }
    .nav button { padding: 8px 10px; font-size: 12px; white-space: nowrap; }
    .topbar .ttl, .topbar .session { display: none; }
  }
</style>
</head>

<div id="app"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

    <text x="50" y="58" font-family="Georgia,serif" font-size="22" fill="#E4C56B" text-anchor="middle">R</text>
  </svg>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js" integrity="sha384-1/m+A1jVWbD3yiK3/vtFvm1+LjK1WLpSoDY+Kaxppwn/yP9BVSgdHTNQVOjrzUO5" crossorigin="anonymous"></script>

<!-- Shell -->
<script type="text/babel">
/* Garde-fou : isole un plantage de page pour éviter l'écran blanc total.
   La topbar reste hors du boundary → on peut toujours changer d'onglet.
   key={activeId} → un boundary neuf par route (l'erreur se réinitialise à la navigation). */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('Plantage de page :', error, info); }
  render() {
    if (!this.state.error) return this.props.children;
    return (
      <div style={{ padding:32, maxWidth:640, margin:'40px auto' }}>
        <div className="panel" style={{ padding:24 }}>
          <h2 style={{ color:'var(--debuff-bright)', marginBottom:10 }}>Cette page a planté</h2>
          <p className="dim" style={{ marginBottom:14 }}>Une erreur a interrompu l'affichage de cette page. Le reste de l'application reste accessible : change d'onglet, ou recharge.</p>
          <pre className="mono" style={{ fontSize:11, whiteSpace:'pre-wrap', color:'var(--faint)', marginBottom:16, maxHeight:160, overflow:'auto' }}>{String((this.state.error && this.state.error.stack) || this.state.error)}</pre>
          <button className="btn btn-gold" onClick={() => location.reload()}>Recharger</button>
        </div>
      </div>
    );
  }
}

/* group: 'main' (barre principale, défaut) | 'more' (menu « ⋯ Plus ») | 'footer' (lien discret bas de page). */
const PAGES = [
  { id:'lobby',   label:'Accueil',      render:() => <HubPage go={setRoute} /> },
  { id:'mj',      label:'Vue MJ',       render:() => <MJPage go={setRoute} /> },
  { id:'sheet',   label:'Fiche Joueur', render:(auth) => <SheetPage lockedCharId={auth.role === 'joueur' ? auth.charId : null} /> },
  { id:'equip',   label:'Équipement',   render:(auth) => <EquipPage lockedCharId={auth.role === 'joueur' ? auth.charId : null} /> },
  { id:'inv',     label:'Inventaire commun', render:() => <CommonInventoryPage /> },
  { id:'runes',   label:'Runes',        render:(auth) => <RuneTreePage lockedCharId={auth.role === 'joueur' ? auth.charId : null} /> },
  { id:'competences', label:'Combat', render:(auth) => <CompetencesPage lockedCharId={auth.role === 'joueur' ? auth.charId : null} /> },
  { id:'recap',   label:'Récap',        render:() => <RecapPage /> },
  { id:'admin',   label:'Admin',        render:() => <AdminPage /> },
  // secondaires : regroupés dans le menu « ⋯ Plus » (staff)
  { id:'journal', label:'Journal',      group:'more', render:() => <JournalPage /> },
  { id:'prog',    label:'Progression',  group:'more', groupByRole:{ joueur:'main' },
    render:(auth) => <ProgressionPage lockedCharId={auth.role === 'joueur' ? auth.charId : null} /> },
  // référence/dev : lien discret en footer (staff)
  { id:'ds',      label:'Design System',group:'footer', render:() => <DesignSystemPage /> },
];
let setRoute; // remonté par App pour la navigation depuis les pages

function App() {
  const auth = useAuthIdentity();
  const [ready, setReady] = useState(false);
  const [moreOpen, setMoreOpen] = useState(false);
  const [route, _setRoute] = useState(() => localStorage.getItem('runeterra_route') || null);
  setRoute = (r) => { _setRoute(r); localStorage.setItem('runeterra_route', r); setMoreOpen(false); };

  useEffect(() => { window.RTDB.ready.then(() => setReady(true)); }, []);
  useEffect(() => { if (auth.role) seedIfEmpty(auth.role); }, [auth.role]);

  // Tant que l'état d'auth n'est pas connu : rien (ni login ni contenu).
  if (!ready || auth.loading) {
    return <div className="page hex-bg" style={{ display:'grid', placeItems:'center', height:'100vh' }}><div className="dim">Connexion…</div></div>;
  }
  // Pas connecté : uniquement l'écran de connexion.
  if (!auth.user) {
    return <ToastProvider><LoginScreen onSubmit={(u, p) => window.RTDB.signIn(u, p)} /></ToastProvider>;
  }
  // Connecté mais sans perso attribué.
  if (isPending(auth.rec)) {
    return <ToastProvider><PendingScreen username={auth.username} onSignOut={() => window.RTDB.signOut()} /></ToastProvider>;
  }

  // Navigation filtrée par rôle, puis répartie par groupe.
  const allowed = PAGES.filter(p => canSeePage(p.id, auth.role));
  // Groupe effectif d'une page : surcharge possible par rôle (ex. Progression = barre pour les joueurs).
  const groupOf = (p) => (p.groupByRole && p.groupByRole[auth.role]) || p.group || 'main';
  const mainPages   = allowed.filter(p => groupOf(p) === 'main');
  const morePages   = allowed.filter(p => groupOf(p) === 'more');
  const footerPages = allowed.filter(p => groupOf(p) === 'footer');
  const fallback = defaultRoute(auth.role);
  const activeId = allowed.some(p => p.id === route) ? route : fallback;
  const cur = allowed.find(p => p.id === activeId) || allowed[0];
  const moreActive = morePages.some(p => p.id === activeId);

  return (
    <ToastProvider>
      <div className="topbar">
        <div className="brand">
          <div className="crest"><i></i><b>R</b></div>
          <span className="ttl">Chroniques de Runeterra</span>
        </div>
        <nav className="nav">
          {mainPages.map(p => (
            <button key={p.id} className={p.id === activeId ? 'active' : ''} onClick={() => setRoute(p.id)}>{p.label}</button>
          ))}
          {morePages.length > 0 && (
            <div style={{ position:'relative' }}>
              <button className={moreActive ? 'active' : ''} onClick={() => setMoreOpen(o => !o)}>⋯ Plus</button>
              {moreOpen && (
                <React.Fragment>
                  <div onClick={() => setMoreOpen(false)} style={{ position:'fixed', inset:0, zIndex:40 }} />
                  <div style={{ position:'absolute', top:'100%', left:0, zIndex:50, marginTop:4, display:'flex', flexDirection:'column', minWidth:170, background:'var(--bg-inset)', border:'1px solid var(--line-gold)', borderRadius:6, overflow:'hidden', boxShadow:'0 8px 24px rgba(0,0,0,.55)' }}>
                    {morePages.map(p => (
                      <button key={p.id} className={p.id === activeId ? 'active' : ''} style={{ textAlign:'left', whiteSpace:'nowrap', borderRadius:0 }} onClick={() => setRoute(p.id)}>{p.label}</button>
                    ))}
                  </div>
                </React.Fragment>
              )}
            </div>
          )}
        </nav>
        <SignOutButton username={auth.username} role={auth.role} onSignOut={() => window.RTDB.signOut()} />
      </div>
      <div className="page hex-bg"><ErrorBoundary key={activeId}>{cur.render(auth)}</ErrorBoundary></div>
      {footerPages.length > 0 && (
        <footer style={{ display:'flex', justifyContent:'center', gap:14, padding:'10px 16px', borderTop:'1px solid var(--line)', background:'var(--bg-inset)' }}>
          {footerPages.map(p => (
            <button key={p.id} onClick={() => setRoute(p.id)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:11, letterSpacing:.5, textTransform:'uppercase', color: p.id === activeId ? 'var(--gold-bright)' : 'var(--ink-dim)' }}>{p.label}</button>
          ))}
        </footer>
      )}
    </ToastProvider>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
